# EvoArena-referenced Benchmark Configuration
# Runs GAIA (Level 1) + LoCoMo — the two external benchmarks cited by EvoArena
#
# Purpose: Validate SkillForge + EvoMem (patch-augmented skill evolution)
# on the same benchmarks used in EvoArena paper Table 1.
#
# EvoArena paper results (for reference):
#   GAIA: Memento-Skill base 62.5% → +EvoMem 66.5% (+4.0pp)
#   LoCoMo: A-Mem base 26.3% → +EvoMem 29.3% (+3.0pp)

# ===== LLM Configuration =====
llm:
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  max_retries: 3

# ===== Benchmarks =====
benchmarks:
  gaia:
    num_samples: 50        # GAIA Level 1 subset (paper uses full L1)
    primary_metric: em
  locomo:
    num_samples: 5         # 5 samples × ~200 QA = ~1000 questions
    primary_metric: f1

# ===== Methods =====
# Compare: B0 (no skill) vs A3 (SkillCurator) vs A3+EvoMem (with patch history)
methods:
  - B0           # Zero-shot baseline
  - A3           # Full SkillCurator (our method)
  - A3+EvoMem   # A3 + patch-augmented retrieval

# ===== EvoMem Configuration =====
evomem:
  enable: true
  patch_top_k: 3               # Number of patches to retrieve per query
  patch_min_similarity: 0.05   # Minimum similarity for patch retrieval
  patch_max_context_tokens: 800  # Token budget for patch context
  record_merges: true
  record_updates: true
  record_deletes: true
  record_reformats: true

# ===== Skill Induction =====
induction:
  variant: hybrid_to_skill
  max_traj_steps: 6

# ===== Compaction (A3 method) =====
compaction:
  merge_threshold: 0.60
  max_merges_per_round: 5
  interval: 8

# ===== Output =====
output:
  experiment_dir: ./experiments
  results_file: evoarena_benchmark_results.json
  log_file: evoarena_benchmark.log
  patches_file: evoarena_patches.json
  log_level: INFO

# ===== Reproducibility =====
seed: 42
