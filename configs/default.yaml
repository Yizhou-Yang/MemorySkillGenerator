# SkillForge default experiment configuration

# ===== LLM Configuration =====
llm:
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  max_retries: 3
  retry_delay: 2

# ===== Embedding Configuration =====
embedding:
  model: Qwen/Qwen3-Embedding-0.6B
  device: cpu
  batch_size: 32
  dimension: 1024

# ===== Memory Configuration =====
memory:
  framework: mem0                       # mem0 / amem / memorybank
  mem0:
    vector_store: chromadb
    collection_name: skillforge_memory
    chunk_size: 512

# ===== Skill Structure Configuration =====
skill:
  max_procedure_steps: 15
  max_constraints: 10
  max_facts: 10
  max_rules: 10

# ===== Trajectory Configuration =====
trajectory:
  max_steps: 50                         # Max steps per trajectory
  record_format: jsonl                  # jsonl / json
  include_observations: true
  include_thoughts: true

# ===== Benchmark Configuration =====
benchmark:
  name: locomo                          # locomo / gaia / swebench
  split: test
  num_samples: 20                       # Sample count for MVP phase
  locomo:
    dataset_path: datasets/locomo
  gaia:
    dataset_path: datasets/gaia
    level: 1

# ===== Skill Induction Configuration =====
skill_induction:
  variants:
    - traj_to_skill
    - memory_to_skill
    - hybrid_to_skill
  hybrid:
    evidence_retrieval_top_k: 5         # Number of evidence snippets to retrieve
    evidence_max_tokens: 2048

# ===== RL Controller Configuration (future use) =====
rl_controller:
  enabled: false
  algorithm: ppo
  state_dim: 8
  hidden_dim: 64
  learning_rate: 0.0003
  gamma: 0.99
  episodes: 1000

# ===== Evaluation Configuration =====
evaluation:
  metrics:
    - success_rate
    - reuse_frequency
    - compression_ratio
    - transfer_score
  num_validation_runs: 3                # Validation runs per skill

# ===== Logging & Output =====
output:
  experiment_dir: ./experiments
  log_level: INFO
  save_trajectories: true
  save_memories: true
  save_skills: true
