# SkillForge 默认实验配置

# ===== LLM 配置 =====
llm:
  provider: deepseek                    # deepseek / hunyuan
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  max_retries: 3
  retry_delay: 2

# ===== Embedding 配置 =====
embedding:
  model: Qwen/Qwen3-Embedding-0.6B
  device: cpu
  batch_size: 32
  dimension: 1024

# ===== Memory 配置 =====
memory:
  framework: mem0                       # mem0 / amem / memorybank
  mem0:
    vector_store: chromadb
    collection_name: skillforge_memory
    chunk_size: 512

# ===== Skill 结构配置 =====
skill:
  max_procedure_steps: 15
  max_constraints: 10
  max_facts: 10
  max_rules: 10

# ===== Trajectory 配置 =====
trajectory:
  max_steps: 50                         # 单条轨迹最大步数
  record_format: jsonl                  # jsonl / json
  include_observations: true
  include_thoughts: true

# ===== Benchmark 配置 =====
benchmark:
  name: locomo                          # locomo / gaia / swebench
  split: test
  num_samples: 20                       # MVP 阶段样本数
  locomo:
    dataset_path: datasets/locomo
  gaia:
    dataset_path: datasets/gaia
    level: 1

# ===== Skill Induction 配置 =====
skill_induction:
  variants:
    - traj_to_skill
    - memory_to_skill
    - hybrid_to_skill
  hybrid:
    evidence_retrieval_top_k: 5         # 回溯 evidence 数量
    evidence_max_tokens: 2048

# ===== RL Controller 配置（后期使用）=====
rl_controller:
  enabled: false
  algorithm: ppo
  state_dim: 8
  hidden_dim: 64
  learning_rate: 0.0003
  gamma: 0.99
  episodes: 1000

# ===== Evaluation 配置 =====
evaluation:
  metrics:
    - success_rate
    - reuse_frequency
    - compression_ratio
    - transfer_score
  num_validation_runs: 3                # 每个 skill 验证运行次数

# ===== 日志与输出 =====
output:
  experiment_dir: ./experiments
  log_level: INFO
  save_trajectories: true
  save_memories: true
  save_skills: true
