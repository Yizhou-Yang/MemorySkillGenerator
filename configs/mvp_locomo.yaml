# MVP 实验配置：LoCoMo + Mem0 + 3 Variants
# 继承 default.yaml，仅覆盖差异项

llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.7

memory:
  framework: mem0

benchmark:
  name: locomo
  split: test
  num_samples: 20

skill_induction:
  variants:
    - traj_to_skill
    - memory_to_skill
    - hybrid_to_skill

rl_controller:
  enabled: false

evaluation:
  num_validation_runs: 3
