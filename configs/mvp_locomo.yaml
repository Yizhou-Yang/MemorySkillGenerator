# MVP experiment config: HotpotQA + Mem0 + 3 Variants
# Inherits from default.yaml, only overrides differences

llm:
  model: deepseek-chat
  temperature: 0.7

memory:
  framework: mem0

benchmark:
  name: hotpotqa
  num_samples: 20

skill_induction:
  variants:
    - traj_to_skill
    - memory_to_skill
    - hybrid_to_skill

rl_controller:
  enabled: false

evaluation:
  num_validation_runs: 3
