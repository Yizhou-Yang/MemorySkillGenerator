# SkillCurator Paper Experiments v4 — 全量配置
# 用法: python scripts/run_paper_v4.py (自动加载此配置)
#
# v4 核心修复:
#   - Compaction Cliff: B2/A3 双线对比（同一 task stream）
#   - Scissors Effect: 3 条独立 library 线（append-only / skillos / ours）
#   - Bound Tightening: B2/A1/A3 三方法 delta 对比
#   - 所有图表使用真实数据，零合成数据

# ===== LLM 配置 =====
llm:
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  max_retries: 3
  retry_delay: 2

# ===== Embedding 配置 =====
embedding:
  model: Qwen/Qwen3-Embedding-0.6B
  device: cpu
  batch_size: 32
  dimension: 1024

# ===== Memory 配置 =====
memory:
  framework: mem0

# ===== Benchmark 分层配置 =====
# Tier 1: 全量规模（最适合 skill induction 的 multi-hop QA）
# Tier 2: 中等规模（不同任务类型的交叉验证）
# Tier 3: 轻量规模（memory-focused 验证）
benchmarks:
  tier1:
    names: [hotpotqa, 2wikimultihopqa, musique]
    train_samples: 40
    test_samples: 50
  tier2:
    names: [triviaqa, gsm8k, alfworld]
    train_samples: 20
    test_samples: 30
  tier3:
    names: [webshop, locomo, longmemeval]
    train_samples: 10
    test_samples: 20

# ===== 实验方法配置 =====
methods:
  # B0: No Memory (baseline)
  B0:
    description: "无 skill library，直接 LLM 回答"
    skill_library: false

  # B1: Append-Only (Memento-Skills 风格)
  B1:
    description: "只追加不删除，模拟 Memento-Skills"
    skill_library: true
    compaction: false
    delete: false

  # B2: SkillOS (INSERT/UPDATE/DELETE)
  B2:
    description: "SkillOS 复现：有 DELETE 但无 MERGE"
    skill_library: true
    compaction: false
    delete: true
    delete_strategy: least_used
    delete_threshold: 8  # library > 8 时才触发 DELETE
    delete_count: 1      # 每次只删 1 个（保守）

  # A1: Semantic Compaction Only (MERGE + Prune)
  A1:
    description: "只做语义压缩（MERGE + Utility Prune），不做注意力优化"
    skill_library: true
    compaction: true
    merge_threshold: 0.65
    max_merges_per_round: 3
    prune_threshold: 15  # library > 15 时才触发 prune
    attention_ops: false

  # A2: Attention Only (Position + Format + Consistency + Rewrite)
  A2:
    description: "只做注意力优化，不做语义压缩"
    skill_library: true
    compaction: false
    attention_ops: true
    position_optimization: true
    format_standardization: true
    consistency_check: true
    semantic_rewrite: true

  # A3: Full SkillCurator (Semantic + Attention)
  A3:
    description: "完整 SkillCurator：MERGE + Prune + 注意力优化"
    skill_library: true
    compaction: true
    merge_threshold: 0.60  # 比 A1 更激进
    max_merges_per_round: 5
    prune_threshold: 15
    attention_ops: true
    position_optimization: true
    format_standardization: true
    consistency_check: true
    semantic_rewrite: true

# ===== Compaction 参数 =====
compaction:
  interval: 8                    # 每 8 个 task 触发一次 lazy compaction
  merge_threshold: 0.60          # 余弦相似度 > 此值视为冗余对
  max_merges_per_round: 5        # 每轮最多合并 5 对
  prune_min_library_size: 15     # library 小于此值不触发 prune
  prune_ratio: 0.125             # 每次 prune 删除 1/8 最低 utility 的 skill

# ===== δ_attention 算子参数 =====
attention_ops:
  position_optimization:
    strategy: utility_recency     # score = β·utility + (1-β)·recency
    beta: 0.7                     # utility 权重
    top_k_head: 3                 # 放在开头的 skill 数
    top_k_tail: 2                 # 放在末尾的 skill 数

  format_standardization:
    target_format: table          # table / list / structured
    max_skill_length: 500         # 超过此长度触发压缩

  consistency_check:
    conflict_threshold: 0.7       # LLM 判定冲突分 > 此值视为矛盾
    resolution_strategy: scope    # scope（明确适用范围）/ priority（标注优先级）

  semantic_rewrite:
    negation_to_positive: true    # "不要做X" → "跳过X"
    externalize_reference: true   # 参考类内容外置

# ===== Phenomena 实验参数 =====
phenomena:
  stream_length: 50              # 每个 phenomenon 实验的 task stream 长度
  compaction_interval: 8         # compaction 触发间隔

  phase_transition:
    skill_pool_sizes: [3, 5, 8, 12, 16, 20, 25, 30]  # 测试的 library 规模
    test_tasks: 20               # 每个规模测试的 task 数

  compaction_cliff:
    benchmarks: [hotpotqa, gsm8k, musique]

  scissors_effect:
    benchmarks: [hotpotqa, 2wikimultihopqa, gsm8k]

# ===== Bound Tightening 实验参数 =====
bound_tightening:
  benchmarks: [hotpotqa, gsm8k]
  stream_length: 35
  compact_interval: 6

# ===== δ_attention 独立性验证参数 =====
delta_attention_independence:
  benchmarks: [hotpotqa, gsm8k]
  test_tasks: 50
  conditions:
    - name: random_order
      description: "随机排列 skill"
    - name: recency_order
      description: "按时间排列"
    - name: utility_order
      description: "按 utility 排列"
    - name: position_optimized
      description: "U 形注意力优化排列"
    - name: raw_format
      description: "原始自然语言格式"
    - name: table_format
      description: "标准化表格格式"
    - name: high_negation
      description: "高否定指令比例"
    - name: positive_rewrite
      description: "正向重写后"
    - name: with_conflicts
      description: "存在矛盾 skill"
    - name: conflicts_resolved
      description: "矛盾消解后"

# ===== 输出配置 =====
output:
  experiment_dir: ./experiments
  results_file: paper_v4_results.json
  log_file: paper_v4.log
  figures_dir: ./paper/figures
  log_level: INFO
  save_trajectories: true
  save_skills: true

# ===== Token 预算 =====
budget:
  max_tokens: 18_000_000         # 总 token 预算 18M（在 20M 限制内）
  estimated_runtime_hours: 8     # 预计运行时间
